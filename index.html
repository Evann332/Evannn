<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            text-align: center; 
            background: linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1543872084-c7bd3822856f?q=80&w=1974&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            padding: 20px; 
            margin: 0; 
        }
        .container { max-width: 400px; margin: auto; }
        
        /* حركة الصورة الشخصية */
        img.profile-pic { 
            width: 140px; height: 140px; border-radius: 50%; 
            border: 4px solid #ffd700; 
            margin-bottom: 20px; 
            animation: glowPulse 2s infinite alternate;
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 10px #ffd700, 0 0 20px #ffd700; transform: scale(1); }
            100% { box-shadow: 0 0 25px #ffd700, 0 0 40px #ff8c00; transform: scale(1.05); }
        }
        
        .animated-name { 
            font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 30px;
            animation: pulseText 2s infinite alternate;
            text-shadow: 0 0 10px #ffd700;
        }

        @keyframes pulseText {
            from { opacity: 0.8; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }

        .link { 
            display: flex; align-items: center; justify-content: start; 
            background: rgba(255, 255, 255, 0.08); margin: 12px 0; padding: 15px; 
            text-decoration: none; color: #fff; border-radius: 15px; 
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); 
            font-weight: 600;
        }
        .link:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.15); border-color: #ffd700; }
        .link i { margin-left: 20px; font-size: 28px; width: 40px; text-align: center; }
        
        /* الألوان الرسمية */
        .fa-telegram { color: #0088cc; }
        .fa-instagram { color: #e1306c; }
        .fa-youtube { color: #ff0000; }
        .fa-snapchat { color: #fffc00; }
        .fa-bullhorn { color: #ffd700; }
        
        .dev-box {
            margin-top: 40px; padding: 25px; background: rgba(0, 0, 0, 0.7);
            border-radius: 20px; border: 1px solid #ffd700;
        }
        .dev-name { font-size: 20px; color: #ffd700; font-weight: bold; margin-bottom: 10px; display: block; }
        .dev-msg { font-size: 15px; color: #ccc; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://g.top4top.io/p_3738ym6sq1.jpg" alt="صورة ايفان مهند" class="profile-pic">

        <a href="https://www.youtube.com/@EvanMuhannad" class="link"><i class="fab fa-youtube"></i> يوتيوب</a>
        <a href="https://www.snapchat.com/add/evanmuhannad?share_id=cwYTkHsvbAI&locale=ar-EG" class="link"><i class="fab fa-snapchat"></i> سناب شات</a>
        <a href="https://t.me/Evann332" class="link" style="border: 1px solid #ffd700;"><i class="fas fa-bullhorn"></i> القناة الرسمية على تليجرام</a>

        <div class="dev-box">
            <span class="dev-name">المطور ايفان مهند</span>

            </div>
        </div>
    </div>
</body>
