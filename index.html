<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة ايفان مهند - الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Cairo', sans-serif; text-align: center; 
            background: linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1543872084-c7bd3822856f?q=80&w=1974&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover; color: white; padding: 20px; margin: 0; 
        }
        .container { max-width: 400px; margin: auto; }
        
        .img-wrapper {
            position: relative;
            width: 150px; height: 150px;
            margin: 0 auto 30px auto;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ffd700, #ff0000, #0088cc, #e1306c, #ffd700);
            background-size: 400%;
            animation: rotateBorder 3s linear infinite;
        }

        @keyframes rotateBorder {
            0% { background-position: 0 0; }
            100% { background-position: 400% 0; }
        }

        img.profile-pic { 
            width: 100%; height: 100%; border-radius: 50%; display: block; object-fit: cover;
            background-color: #000;
        }

        .animated-name { 
            font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 30px;
            animation: zoomPulse 2s infinite alternate; text-shadow: 0 0 10px #ffd700;
        }
        @keyframes zoomPulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .link { 
            display: flex; align-items: center; justify-content: start; 
            background: rgba(255, 255, 255, 0.08); margin: 12px 0; padding: 15px; 
            text-decoration: none; color: #fff; border-radius: 15px; 
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); font-weight: 600;
        }
        .link:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.15); border-color: #ffd700; }
        .link i { margin-left: 20px; font-size: 28px; width: 40px; text-align: center; }
        
        .fa-telegram { color: #0088cc; }
        .fa-instagram { color: #e1306c; }
        .fa-youtube { color: #ff0000; }
        .fa-snapchat { color: #fffc00; }
        .fa-bullhorn { color: #ffd700; }
        
        .dev-box {
            margin-top: 40px; padding: 25px; background: rgba(0, 0, 0, 0.7);
            border-radius: 20px; border: 1px solid #ffd700;
        }
        .dev-name { font-size: 20px; color: #ffd700; font-weight: bold; margin-bottom: 10px; display: block; }
        .dev-msg { font-size: 15px; color: #ccc; line-height: 1.8; }
    </style>
</head>
<body onclick="activateExperience()">
    <div class="container">
        <div class="img-wrapper">
            <img src="https://g.top4top.io/p_3738ym6sq1.jpg" alt="صورة ايفان مهند" class="profile-pic">
        </div>
        
        <h1 class="animated-name">ايفان مهند</h1>
        
        <!-- استخدام target="_blank" يضمن فتح الروابط مباشرة في المتصفح الخارجي -->
        <a href="https://t.me/eva33n" class="link" target="_blank"><i class="fab fa-telegram"></i> تليجرام الخاص</a>
        <a href="https://www.instagram.com/e.3van?igsh=dWtxdjRnZGxla3V5" class="link" target="_blank"><i class="fab fa-instagram"></i> انستجرام</a>
        <a href="https://www.youtube.com/@EvanMuhannad" class="link" target="_blank"><i class="fab fa-youtube"></i> يوتيوب</a>
        <a href="https://www.snapchat.com/add/evanmuhannad?share_id=cwYTkHsvbAI&locale=ar-EG" class="link" target="_blank"><i class="fab fa-snapchat"></i> سناب شات</a>
        <a href="https://t.me/Evann332" class="link" target="_blank" style="border: 1px solid #ffd700;"><i class="fas fa-bullhorn"></i> القناة الرسمية على تليجرام</a>

        <div class="dev-box">
            <span class="dev-name">المطور ايفان مهند</span>
            <div class="dev-msg">
                🇮🇶 نخطو نحو القمة لنقدم لكم أفضل المحتويات التقنية والترفيهية بإبداع عراقي خالص. كونوا معنا في عالمنا.
            </div>
        </div>
    </div>

    <audio id="gameMusic" loop>
        <source src="ضع_رابط_الموسيقى_هنا.mp3" type="audio/mpeg">
    </audio>

    <script>
        function activateExperience() {
            var music = document.getElementById("gameMusic");
            if(music.paused) { music.play(); }
            
            var msg = new SpeechSynthesisUtterance("إيفان مهند معكم لا خوف عليكم");
            msg.lang = 'ar-IQ';
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
